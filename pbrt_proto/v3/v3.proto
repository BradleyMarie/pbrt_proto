syntax = "proto2";

import "pbrt_proto/pbrt.proto";

package pbrt_proto.v3;

// A directive which sets the Accelerator to use for rendering.
message Accelerator {
  // The type of Accelerator to use. If none are set, then `bvh` should be read
  // as if it is present.
  oneof accelerator_type {
    KdTreeAccelerator kdtree = 2;  // Use a KD-tree accelerator
    BvhAccelerator bvh = 3;  // Use a BVH accelerator (default)
  }
}

// A directive which sets the current area light source.
message AreaLightSource {
  // The type of AreaLightSource. If none are set, then the current area light
  // source should be unset.
  oneof area_light_source_type {
    DiffuseAreaLightSource diffuse = 1;  // Use a diffuse area light
  }
}

// A directive which sets the Camera to use for rendering.
message Camera {
  // The type of camera to use. If none are set, then the current camera should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof camera_type {
    SphericalCamera environment = 1;  // Use a spherical camera
    OrthographicCamera orthographic = 2; // Use an orthographic camera
    PerspectiveCamera perspective = 3;  // Use a pespective camera
    RealisticCamera realistic = 4;  // Use a realistic camera
  }
}

// A directive which sets the Film to use for rendering.
message Film {
  // The type of film to use. If none are set, then the current film should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof film_type {
    RgbFilm image = 1;  // Use an rgb film
  }
}

// A directive which creates a named FloatTexture.
message FloatTexture {
  // The name of the texture.
  required string name = 1;

  // The type of FloatTexture to create. If none are set this directive should
  // be ignored.
  oneof float_texture_type {
    BilerpFloatTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DFloatTexture checkerboard2d = 3;  // Create a 2D checkerboard
    Checkerboard3DFloatTexture checkerboard3d = 4;  // Create a 3D checkerboard
    ConstantFloatTexture constant = 5;  // Create a constant texture
    DotsFloatTexture dots = 6;  // Create a dots texture
    FBmFloatTexture fbm = 7;  // Create an FBm texture
    ImageMapFloatTexture imagemap = 8;  // Create an image map texture
    MixFloatTexture mix = 9;  // Create a mix texture
    ScaleFloatTexture scale = 10;  // Create a scale texture
    WindyFloatTexture windy = 11;  // Create a windy texture
    WrinkledFloatTexture wrinkled = 12;  // Create a wrinkled texture
    PtexFloatTexture ptex = 13;  // Create a ptex texture
  }
}

message Integrator {
  enum LightSampleStrategy {
    SPATIAL = 0;
    POWER = 1;
    UNIFORM = 2;
  }

  message PixelBounds {
    required uint32 x_min = 1;
    required uint32 x_max = 2;
    required uint32 y_min = 3;
    required uint32 y_max = 4;
  }

  message AmbientOcclusion {
    optional bool cossample = 1 [default = true];
    optional uint32 nsamples = 2 [default = 64];
    optional PixelBounds pixelbounds = 3;
  }

  message Bdpt {
    optional uint32 maxdepth = 1 [default = 5];
    optional bool visualizestrategies = 2 [default = false];
    optional bool visualizeweights = 3 [default = false];
    optional LightSampleStrategy lightsamplestrategy = 4 [default = POWER];
    optional PixelBounds pixelbounds = 5;
  }

  message DirectLighting {
    enum Strategy {
      ALL = 0;
      ONE = 1;
    }

    optional uint32 maxdepth = 1 [default = 5];
    optional Strategy strategy = 2 [default = ALL];
    optional PixelBounds pixelbounds = 3;
  }

  message Mlt {
    optional uint32 maxdepth = 1 [default = 5];
    optional uint32 bootstrapsamples = 2 [default = 100000];
    optional uint32 chains = 3 [default = 1000];
    optional uint32 mutationsperpixel = 4 [default = 100];
    optional double largestepprobability = 5 [default = 0.3];
    optional double sigma = 6 [default = 0.01];
  }

  message Path {
    optional uint32 maxdepth = 1 [default = 5];
    optional double rrthreshold = 2 [default = 1.0];
    optional LightSampleStrategy lightsamplestrategy = 3 [default = SPATIAL];
    optional PixelBounds pixelbounds = 4;
  }

  message Sppm {
    optional uint32 maxdepth = 1 [default = 5];
    optional uint32 numiterations = 2 [default = 64];
    optional uint32 photonsperiteration = 3 [default = 0];
    optional uint32 imagewritefrequency = 4 [default = 2147483648];
    optional double radius = 5 [default = 1.0];
  }

  message VolPath {
    optional uint32 maxdepth = 1 [default = 5];
    optional double rrthreshold = 2 [default = 1.0];
    optional LightSampleStrategy lightsamplestrategy = 3 [default = SPATIAL];
    optional PixelBounds pixelbounds = 4;
  }

  message Whitted {
    optional uint32 maxdepth = 1 [default = 5];
    optional PixelBounds pixelbounds = 2;
  }

  // If attempting to render to a Film that does not have one of these fields
  // set, the renderer should render a black image.
  //
  // https://github.com/mmp/pbrt-v3/blob/13d871faae88233b327d04cda24022b8bb0093ee/src/core/api.cpp#L1619
  oneof integrator_type {
    AmbientOcclusion ambientocclusion = 1;
    Bdpt bdpt = 2;
    DirectLighting directlighting = 3;
    Mlt mlt = 4;
    Path path = 5;
    Sppm sppm = 6;
    VolPath volpath = 7;
    Whitted whitted = 8;
  }
}

message MakeNamedMaterial {
  required string name = 1;
  required Material material = 2;
}

// A directive which creates a named participating medium.
message MakeNamedMedium {
  // The name to give the created medium.
  required string name = 1;

  // The type of medium to create. If none are set, then the directive should
  // have no effect.
  oneof medium_type {
    HomogeneousMedium homogeneous = 2;  // Create a homogenous medium
    UniformGridMedium heterogeneous = 3;  // Create a heterogeneous medium
  }
}

message Material {
  message Disney {
    optional bool thin = 2 [default = false];
    optional FloatTextureParameter anisotropic = 7;
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter clearcoat = 11;
    optional FloatTextureParameter clearcoatgloss = 12;
    optional FloatTextureParameter difftrans = 13;
    optional FloatTextureParameter eta = 14;
    optional FloatTextureParameter flatness = 16;
    optional FloatTextureParameter metallic = 17;
    optional FloatTextureParameter roughness = 19;
    optional FloatTextureParameter sheen = 20;
    optional FloatTextureParameter sheentint = 21;
    optional FloatTextureParameter spectrans = 23;
    optional FloatTextureParameter speculartint = 24;
    optional SpectrumTextureParameter color = 30;
    optional SpectrumTextureParameter scatterdistance = 39;
  }

  message Fourier {
    optional FloatTextureParameter bumpmap = 10;
    optional string bsdffile = 43 [default = ""];
  }

  message Glass {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter eta = 14;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional SpectrumTextureParameter Kr = 33;
    optional SpectrumTextureParameter Kt = 35;
  }

  message Hair {
    optional FloatTextureParameter alpha = 6;
    optional FloatTextureParameter beta_m = 8;
    optional FloatTextureParameter beta_n = 9;
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter eta = 14;
    optional FloatTextureParameter eumelanin = 15;
    optional FloatTextureParameter pheomelanin = 18;
    optional SpectrumTextureParameter color = 30; // Must check
    optional SpectrumTextureParameter sigma_a = 40; // Must check
  }

  message KdSubsurface {
    optional bool remaproughness = 1 [default = true];
    optional double eta = 3 [default = 1.33];
    optional double g = 4 [default = 0.0];
    optional double scale = 5 [default = 1.0];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Kr = 33;
    optional SpectrumTextureParameter Kt = 35;
    optional SpectrumTextureParameter mfp = 36;
  }

  message Matte {
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter sigma = 22;
    optional SpectrumTextureParameter Kd = 32;
  }

  message Metal {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter roughness = 19;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional SpectrumTextureParameter eta = 29;
    optional SpectrumTextureParameter k = 31;
  }

  message Mirror {
    optional FloatTextureParameter bumpmap = 10;
    optional SpectrumTextureParameter Kr = 33;
  }

  message Mix {
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter sigma = 22;
    optional SpectrumTextureParameter amount = 28;
    optional SpectrumTextureParameter Kd = 32;
    optional string namedmaterial1 = 44 [default = ""];
    optional string namedmaterial2 = 45 [default = ""];
  }

  message Plastic {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter roughness = 19;
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Ks = 34;
  }

  message Substrate {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Ks = 34;
  }

  message Subsurface {
    optional bool remaproughness = 1 [default = true];
    optional double eta = 3 [default = 1.33];
    optional double g = 4 [default = 0.0];  // Must be explicitly cleared if name is set
    optional double scale = 5 [default = 1.0];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional MeasuredScatteringPreset name = 27;
    optional SpectrumTextureParameter Kr = 33;
    optional SpectrumTextureParameter Kt = 35;
    optional SpectrumTextureParameter sigma_a = 40;
    optional SpectrumTextureParameter sigma_s = 41;
  }

  message Translucent {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter roughness = 19;
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Ks = 34;
    optional SpectrumTextureParameter reflect = 38;
    optional SpectrumTextureParameter transmit = 42;
  }

  message Uber {
    optional bool remaproughness = 1 [default = true];
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter eta = 14;
    optional FloatTextureParameter roughness = 19;
    optional FloatTextureParameter uroughness = 25;  // Must check
    optional FloatTextureParameter vroughness = 26;  // Must check
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Kr = 33;
    optional SpectrumTextureParameter Ks = 34;
    optional SpectrumTextureParameter Kt = 35;
    optional SpectrumTextureParameter opacity = 37;
  }

  // If none of these fields are set, surfaces with this material applied should
  // be ignored during ray intersections. 
  oneof material_type {
    Disney disney = 1;
    Fourier fourier = 2;
    Glass glass = 3;
    Hair hair = 4;
    KdSubsurface kdsubsurface = 5;
    Matte matte = 6;
    Metal metal = 7;
    Mirror mirror = 8;
    Mix mix = 9;
    Plastic plastic = 10;
    Substrate substrate = 11;
    Subsurface subsurface = 12;
    Translucent translucent = 13;
    Uber uber = 14;
  }
}

// A directive which creates a light source.
message LightSource {
  // The type of light source to create. If none of these fields are set, the
  // directive should have no impact.
  oneof light_source_type {
    DistantLightSource distant = 1;  // Create a distant directional light
    GoniometricLightSource goniometric = 2;  // Create a goniometric point light
    InfiniteLightSource infinite = 3;  // Create a distant spherical light
    PointLightSource point = 5;  // Create a point light
    ProjectionLightSource projection = 6;  // Create a projected light
    SpotLightSource spot = 7;  // Create a spot light
  }
}

// A directive which sets the Camera to use for rendering.
message PixelFilter {
  // The type of PixelFilter to use. If none are set, then the current
  // PixelFilter should be unset. If no PixelFilter is set at the time an image
  // is to be rendered the renderer should exit with an error.
  oneof pixel_filter_type {
    BoxPixelFilter box = 1;  // Use a box filter
    GaussianPixelFilter gaussian = 2;  // Use a Gaussian filter
    MitchellPixelFilter mitchell = 3;  // Use a Mitchell-Netravali filter
    LanczosPixelFilter sinc = 4;  // Use a Lanczos filter
    TrianglePixelFilter triangle = 5;  // Use a triangle filter
  }
}

// A directive which sets the Sampler to use for rendering.
message Sampler {
  // A sampler which uses the Grunschloss maximized-minimized algorithm.
  message MaxMinDist {
    // The number of samples to do per pixel.
    optional uint32 pixelsamples = 1 [default = 16];

    // The maximum number of sampled dimensions before falling back to a PRNG.
    optional uint32 dimensions = 4 [default = 4];
  }

  // The type of Sampler to use. If none are set, then the current Sampler
  // should be unset. If no Sampler is set at the time an image is to be
  // rendered a black frame should be rendered.
  oneof sampler_type {
    ZeroTwoSequenceSampler zerotwosequence = 2;  // Use a 02-sequence sampler
    StratifiedSampler stratified = 4;  // Use a stratified sampler
    IndependentSampler random = 6;  // Use a random sampler
    HaltonSampler halton = 7;  // Use a Halton seqeuence sampler
    MaxMinDist maxmindist = 8;  // Use a min-max distribution sampler
    SobolSampler sobol = 9;  // Use a Sobol sequence sampler
  }
}

// TODO
message MaterialOverrides {
  optional SpectrumTextureParameter Kd = 1;
  optional SpectrumTextureParameter Ks = 2;
  optional SpectrumTextureParameter Kr = 3;
  optional SpectrumTextureParameter Kt = 4;
  optional SpectrumTextureParameter reflect = 5;
  optional SpectrumTextureParameter transmit = 6;
  optional SpectrumTextureParameter opacity = 7;
  optional FloatTextureParameter roughness = 8;
  optional FloatTextureParameter uroughness = 9;
  optional FloatTextureParameter vroughness = 10;
  optional FloatTextureParameter eta = 11;
  optional FloatTextureParameter sigma = 12;
  optional FloatTextureParameter bumpmap = 13;
  optional SpectrumTextureParameter amount = 14;
  optional SpectrumTextureParameter eta_as_spectrum_texture = 15;
  optional SpectrumTextureParameter k = 16;
  optional string namedmaterial1 = 17;
  optional string namedmaterial2 = 18;
  optional bool remaproughness = 99;
}

message Shape {
  message Cone {
    optional double radius = 1 [default = 1.0];
    optional double height = 2 [default = 1.0];
    optional double phimax = 3 [default = 360.0];
  }

  message Curve {
    enum Basis {
      BEZIER = 1;
      BSPLINE = 2;
    }

    enum Degree {
      THREE = 1;
      FOUR = 2;
    }

    enum Type {
      CYLINDER = 1;
      FLAT = 2;
      RIBBON = 3;
    }

    message Normals {
      required Vector n0 = 1;
      required Vector n1 = 2;
    }

    // If using pbrt_proto::v3::Canonicalize, width0 and width1 will be filled
    // with the value from width if not set.
    repeated Point P = 1;
    optional Basis basis = 2 [default = BEZIER];
    optional Degree degree = 3 [default = THREE];
    optional Type type = 4 [default = FLAT];
    repeated Vector N = 5;
    optional double width = 6 [default = 1.0];
    optional double width0 = 7;  // Must check
    optional double width1 = 8;  // Must check
    optional uint32 splitdepth = 9 [default = 3];
  }

  message Cylinder {
    optional double radius = 1 [default = 1.0];
    optional double zmin = 2 [default = -1.0];
    optional double zmax = 3 [default = 1.0];
    optional double phimax = 4 [default = 360.0];
  }

  message Disk {
    optional double height = 1 [default = 0.0];
    optional double radius = 2 [default = 1.0];
    optional double innerradius = 3 [default = 0.0];
    optional double phimax = 4 [default = 360.0];
  }

  message HeightField {
    optional uint32 nu = 1;
    optional uint32 nv = 2;
    repeated double Pz = 3;
  }

  message Hyperboloid {
    optional Point p1 = 1;
    optional Point p2 = 2;
    optional double phimax = 3 [default = 360.0];
  }

  message LoopSubdiv {
    message VertexIndices {
      required uint32 v0 = 1;
      required uint32 v1 = 2;
      required uint32 v2 = 3;
    }

    optional uint32 levels = 1 [default = 3];
    repeated VertexIndices indices = 2;
    repeated Point P = 3;
  }

  message Nurbs {
    message PointWithWeight {
      required Point p = 1;
      required double weight = 2;
    }

    optional uint32 nu = 1;
    optional uint32 nv = 2;
    optional uint32 uorder = 3;
    optional uint32 vorder = 4;
    repeated float uknots = 5;
    repeated float vknots = 6;
    optional double u0 = 7;
    optional double v0 = 9;
    optional double u1 = 10;
    optional double v1 = 11;
    repeated Point P = 12;
    repeated PointWithWeight Pw = 13;
  }

  message Paraboloid {
    optional double radius = 1 [default = 1.0];
    optional double zmin = 2 [default = 0.0];
    optional double zmax = 3 [default = 1.0];
    optional double phimax = 4 [default = 360.0];
  }

  message PlyMesh {
    optional string filename = 1 [default = ""];
    optional FloatTextureParameter alpha = 2;
    optional FloatTextureParameter shadowalpha = 3;
  }

  message Sphere {
    optional double radius = 1 [default = 1.0];
    optional double zmin = 2;  // Must check
    optional double zmax = 3;  // Must check
    optional double phimax = 4 [default = 360.0];
  }

  message TriangleMesh {
    message VertexIndices {
      required uint32 v0 = 1;
      required uint32 v1 = 2;
      required uint32 v2 = 3;
    }

    message UVCoordinate {
      required double u = 1;
      required double v = 2;
    }

    repeated VertexIndices indices = 1;
    repeated Point P = 2;
    repeated Vector N = 3;
    repeated Vector S = 4;
    repeated UVCoordinate uv = 5;
    repeated int32 faceIndices = 6;
    optional FloatTextureParameter alpha = 7;
    optional FloatTextureParameter shadowalpha = 8;
  }

  // If none of these fields are set, the directive should be ignored and have
  // no impact.
  //
  // https://github.com/mmp/pbrt-v3/blob/13d871faae88233b327d04cda24022b8bb0093ee/src/core/api.cpp#L1345
  // https://github.com/mmp/pbrt-v3/blob/13d871faae88233b327d04cda24022b8bb0093ee/src/core/api.cpp#L1373
  oneof shape_type {
    Cone cone = 1;
    Curve curve = 2;
    Cylinder cylinder = 3;
    Disk disk = 4;
    HeightField heightfield = 5;
    Hyperboloid hyperboloid = 6;
    LoopSubdiv loopsubdiv = 7;
    Nurbs nurbs = 8;
    Paraboloid paraboloid = 9;
    PlyMesh plymesh = 10;
    Sphere sphere = 11;
    TriangleMesh trianglemesh = 12;
  }

  message MaterialOverrides {
    optional bool remaproughness = 1;
    optional bool thin = 2;
    optional double eta_as_value = 3;
    optional double g = 4;
    optional double scale = 5;
    optional FloatTextureParameter alpha = 6;
    optional FloatTextureParameter anisotropic = 7;
    optional FloatTextureParameter beta_m = 8;
    optional FloatTextureParameter beta_n = 9;
    optional FloatTextureParameter bumpmap = 10;
    optional FloatTextureParameter clearcoat = 11;
    optional FloatTextureParameter clearcoatgloss = 12;
    optional FloatTextureParameter difftrans = 13;
    optional FloatTextureParameter eta_as_float_texture = 14;
    optional FloatTextureParameter eumelanin = 15;
    optional FloatTextureParameter flatness = 16;
    optional FloatTextureParameter metallic = 17;
    optional FloatTextureParameter pheomelanin = 18;
    optional FloatTextureParameter roughness = 19;
    optional FloatTextureParameter sheen = 20;
    optional FloatTextureParameter sheentint = 21;
    optional FloatTextureParameter sigma = 22;
    optional FloatTextureParameter spectrans = 23;
    optional FloatTextureParameter speculartint = 24;
    optional FloatTextureParameter uroughness = 25;
    optional FloatTextureParameter vroughness = 26;
    optional MeasuredScatteringPreset name = 27;
    optional SpectrumTextureParameter amount = 28;
    optional SpectrumTextureParameter eta_as_spectrum_texture = 29;
    optional SpectrumTextureParameter color = 30;
    optional SpectrumTextureParameter k = 31;
    optional SpectrumTextureParameter Kd = 32;
    optional SpectrumTextureParameter Kr = 33;
    optional SpectrumTextureParameter Ks = 34;
    optional SpectrumTextureParameter Kt = 35;
    optional SpectrumTextureParameter mfp = 36;
    optional SpectrumTextureParameter opacity = 37;
    optional SpectrumTextureParameter reflect = 38;
    optional SpectrumTextureParameter scatterdistance = 39;
    optional SpectrumTextureParameter sigma_a = 40;
    optional SpectrumTextureParameter sigma_s = 41;
    optional SpectrumTextureParameter transmit = 42;
    optional string bsdffile = 43;
    optional string namedmaterial1 = 44;
    optional string namedmaterial2 = 45;
  }

  // If your protobuf implementation supports lazy fields, there is no need to
  // parse this field and it can instead be merged as a string directly onto
  // whatever material is being applied to this shape.
  optional MaterialOverrides overrides = 13 [lazy = true];
}

// A directive which creates a named SpectrumTexture.
message SpectrumTexture {
  // The name of the texture.
  required string name = 1;

  // The type of SpectrumTexture to create. If none are set this directive
  // should be ignored.
  oneof spectrum_texture_type {
    BilerpSpectrumTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DSpectrumTexture checkerboard2d = 3;  // Create a 2D board
    Checkerboard3DSpectrumTexture checkerboard3d = 4;  // Create a 3D board
    ConstantSpectrumTexture constant = 5;  // Create a constant texture
    DotsSpectrumTexture dots = 6;  // Create a dots texture
    FBmSpectrumTexture fbm = 7;  // Create an FBm texture
    ImageMapSpectrumTexture imagemap = 8;  // Create an image map texture
    MarbleSpectrumTexture marble = 9;  // Create an marble texture
    MixSpectrumTexture mix = 10;  // Create a mix texture
    ScaleSpectrumTexture scale = 11;  // Create a scale texture
    UvSpectrumTexture uv = 12;  // Create a UV texture
    WindySpectrumTexture windy = 13;  // Create a windy texture
    WrinkledSpectrumTexture wrinkled = 14;  // Create a wrinkled texture
    PtexSpectrumTexture ptex = 15;  // Create a ptex texture
  }
}

message Directive {
  oneof directive_type {
    Accelerator accelerator = 1;
    ActiveTransform active_transform = 2;
    AreaLightSource area_light_source = 3;
    AttributeBegin attribute_begin = 4;
    AttributeEnd attribute_end = 5;
    Camera camera = 6;
    ConcatTransform concat_transform = 7;
    CoordinateSystem coordinate_system = 8;
    CoordSysTransform coord_sys_transform = 9;
    Film film = 10;
    FloatTexture float_texture = 11;
    Identity identity = 12;
    Include include = 13;
    Integrator integrator = 14;
    LightSource light_source = 15;
    LookAt look_at = 16;
    MakeNamedMaterial make_named_material = 17;
    MakeNamedMedium make_named_medium = 18;
    Material material = 19;
    MediumInterface medium_interface = 20;
    NamedMaterial named_material = 21;
    ObjectBegin object_begin = 22;
    ObjectEnd object_end = 23;
    ObjectInstance object_instance = 24;
    PixelFilter pixel_filter = 25;
    ReverseOrientation reverse_orientation = 26;
    Rotate rotate = 27;
    Sampler sampler = 28;
    Shape shape = 29;
    Scale scale = 30;
    SpectrumTexture spectrum_texture = 31;
    Transform transform = 32;
    TransformBegin transform_begin = 33;
    TransformEnd transform_end = 34;
    TransformTimes transform_times = 35;
    Translate translate = 36;
    WorldBegin world_begin = 37;
    WorldEnd world_end = 38;
  }
}

message PbrtProto {
  repeated Directive directives = 1;
}

syntax = "proto2";

import "pbrt_proto/pbrt.proto";

package pbrt_proto.v3;

// A directive which sets the Accelerator to use for rendering.
message Accelerator {
  // The type of Accelerator to use. If none are set, then `bvh` should be read
  // as if it is present.
  oneof accelerator_type {
    KdTreeAccelerator kdtree = 2;  // Use a KD-tree accelerator
    BvhAccelerator bvh = 3;  // Use a BVH accelerator (default)
  }
}

// A directive which sets the current area light source.
message AreaLightSource {
  // The type of AreaLightSource. If none are set, then the current area light
  // source should be unset.
  oneof area_light_source_type {
    DiffuseAreaLightSource diffuse = 1;  // Use a diffuse area light
  }
}

// A directive which sets the Camera to use for rendering.
message Camera {
  // The type of camera to use. If none are set, then the current camera should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof camera_type {
    SphericalCamera environment = 1;  // Use a spherical camera
    OrthographicCamera orthographic = 2; // Use an orthographic camera
    PerspectiveCamera perspective = 3;  // Use a pespective camera
    RealisticCamera realistic = 4;  // Use a realistic camera
  }
}

// A directive which sets the Film to use for rendering.
message Film {
  // The type of film to use. If none are set, then the current film should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof film_type {
    RgbFilm image = 1;  // Use an rgb film
  }
}

// A directive which creates a named FloatTexture.
message FloatTexture {
  // The name of the texture.
  required string name = 1;

  // The type of FloatTexture to create. If none are set this directive should
  // be ignored.
  oneof float_texture_type {
    BilerpFloatTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DFloatTexture checkerboard2d = 3;  // Create a 2D checkerboard
    Checkerboard3DFloatTexture checkerboard3d = 4;  // Create a 3D checkerboard
    ConstantFloatTexture constant = 5;  // Create a constant texture
    DotsFloatTexture dots = 6;  // Create a dots texture
    FBmFloatTexture fbm = 7;  // Create an FBm texture
    ImageMapFloatTexture imagemap = 8;  // Create an image map texture
    MixFloatTexture mix = 9;  // Create a mix texture
    ScaleFloatTexture scale = 10;  // Create a scale texture
    WindyFloatTexture windy = 11;  // Create a windy texture
    WrinkledFloatTexture wrinkled = 12;  // Create a wrinkled texture
    PtexFloatTexture ptex = 13;  // Create a ptex texture
  }
}

// A directive which sets the Integrator to use for rendering.
message Integrator {
  // The type of integrator to use. If none are set, then the current integrator
  // should be unset. If no integrator is set at the time an image is to be
  // rendered the renderer should exit with an error.
  oneof integrator_type {
    BdptIntegrator bdpt = 1;  // Create a bidirectional integrator
    DirectLightingIntegrator directlighting = 3;  // Create a direct integrator
    PathIntegrator path = 7;  // Create a path integrator
    WhittedIntegrator whitted = 9;  // Create a Whitted integrator
    AmbientOcclusionIntegrator ambientocclusion = 10;  // Create a AO integrator
    MltIntegrator mlt = 15;  // Creates an MLT integrator
    SppmIntegrator sppm = 16;  // Creates an SPPM integrator
    VolPathIntegrator volpath = 17;  // Creates a volumetric path integrator
  }
}

// A directive which creates a named material.
message MakeNamedMaterial {
  // The name to give the created medium.
  required string name = 1;

  // The material to create.
  required Material material = 2;
}

// A directive which creates a named participating medium.
message MakeNamedMedium {
  // The name to give the created medium.
  required string name = 1;

  // The type of medium to create. If none are set, then the directive should
  // have no effect.
  oneof medium_type {
    HomogeneousMedium homogeneous = 2;  // Create a homogenous medium
    UniformGridMedium heterogeneous = 3;  // Create a heterogeneous medium
  }
}

// A directive which creates a material.
message Material {
  // If none of these fields are set, surfaces with this material applied should
  // be ignored during ray intersections.
  oneof material_type {
    GlassMaterial glass = 5;  // Create a glass material
    MatteMaterial matte = 6;  // Create a mirror material
    MirrorMaterial mirror = 7;  // Create a mirror material
    PlasticMaterial plastic = 8;  // Create a plastic material
    ShinyMetalMaterial shinymetal = 10;  // Create a shiny metal material
    SubstrateMaterial substrate = 12;  // Create a substrate material
    TranslucentMaterial translucent = 13;  // Create a translucent material
    UberMaterial uber = 14;  // Create a uber material
    KdSubsurfaceMaterial kdsubsurface = 15;  // Create a Kd subsurface material
    MetalMaterial metal = 17; // Create a metal material
    MixMaterial mix = 18;  // Create a mix material
    DisneyMaterial disney = 19;  // Create a Disney material
    MeasuredFourierMaterial fourier = 20;  // Create a measured Fourier material
    HairMaterial hair = 21;  // Create a hair material
    SubsurfaceMaterial subsurface = 22;  // Create a subsurface material
  }
}

// A directive which creates a light source.
message LightSource {
  // The type of light source to create. If none of these fields are set, the
  // directive should have no impact.
  oneof light_source_type {
    DistantLightSource distant = 1;  // Create a distant directional light
    GoniometricLightSource goniometric = 2;  // Create a goniometric point light
    InfiniteLightSource infinite = 3;  // Create a distant spherical light
    PointLightSource point = 5;  // Create a point light
    ProjectionLightSource projection = 6;  // Create a projected light
    SpotLightSource spot = 7;  // Create a spot light
  }
}

// A directive which sets the Camera to use for rendering.
message PixelFilter {
  // The type of PixelFilter to use. If none are set, then the current
  // PixelFilter should be unset. If no PixelFilter is set at the time an image
  // is to be rendered the renderer should exit with an error.
  oneof pixel_filter_type {
    BoxPixelFilter box = 1;  // Use a box filter
    GaussianPixelFilter gaussian = 2;  // Use a Gaussian filter
    MitchellPixelFilter mitchell = 3;  // Use a Mitchell-Netravali filter
    LanczosPixelFilter sinc = 4;  // Use a Lanczos filter
    TrianglePixelFilter triangle = 5;  // Use a triangle filter
  }
}

// A directive which sets the Sampler to use for rendering.
message Sampler {
  // A sampler which uses the Grunschloss maximized-minimized algorithm.
  message MaxMinDist {
    // The number of samples to do per pixel.
    optional uint32 pixelsamples = 1 [default = 16];

    // The maximum number of sampled dimensions before falling back to a PRNG.
    optional uint32 dimensions = 4 [default = 4];
  }

  // The type of Sampler to use. If none are set, then the current Sampler
  // should be unset. If no Sampler is set at the time an image is to be
  // rendered a black frame should be rendered.
  oneof sampler_type {
    ZeroTwoSequenceSampler zerotwosequence = 2;  // Use a 02-sequence sampler
    StratifiedSampler stratified = 4;  // Use a stratified sampler
    IndependentSampler random = 6;  // Use a random sampler
    HaltonSampler halton = 7;  // Use a Halton seqeuence sampler
    MaxMinDist maxmindist = 8;  // Use a min-max distribution sampler
    SobolSampler sobol = 9;  // Use a Sobol sequence sampler
  }
}

// A directive which creates a shape.
message Shape {
  // The overrides for the materials applied to the shape.
  message MaterialOverrides {
    optional SpectrumTextureParameter Kd = 1;
    optional SpectrumTextureParameter Ks = 2;
    optional SpectrumTextureParameter Kr = 3;
    optional SpectrumTextureParameter Kt = 4;
    optional SpectrumTextureParameter reflect = 5;
    optional SpectrumTextureParameter transmit = 6;
    optional SpectrumTextureParameter opacity = 7;
    optional FloatTextureParameter roughness = 8;
    optional FloatTextureParameter uroughness = 9;
    optional FloatTextureParameter vroughness = 10;
    optional FloatTextureParameter eta = 11;
    optional FloatTextureParameter sigma = 12;
    optional FloatTextureParameter bumpmap = 13;
    optional SpectrumTextureParameter amount = 14;
    optional SpectrumTextureParameter eta_as_spectrum_texture = 15;
    optional SpectrumTextureParameter k = 16;
    optional FloatTextureParameter meanfreepath = 17;
    optional string filename = 18;
    optional string namedmaterial1 = 19;
    optional string namedmaterial2 = 20;
    optional MeasuredScatteringPreset name = 21;
    optional SpectrumTextureParameter color = 22;
    optional SpectrumTextureParameter mfp = 23;
    optional SpectrumTextureParameter sigma_a = 24;
    optional SpectrumTextureParameter sigma_s = 25;
    optional SpectrumTextureParameter scatterdistance = 26;
    optional FloatTextureParameter alpha = 27;
    optional FloatTextureParameter anisotropic = 28;
    optional FloatTextureParameter beta_m = 29;
    optional FloatTextureParameter beta_n = 30;
    optional FloatTextureParameter clearcoat = 31;
    optional FloatTextureParameter clearcoatgloss = 32;
    optional FloatTextureParameter difftrans = 33;
    optional FloatTextureParameter eumelanin = 34;
    optional FloatTextureParameter flatness = 35;
    optional FloatTextureParameter metallic = 36;
    optional FloatTextureParameter pheomelanin = 37;
    optional FloatTextureParameter spectrans = 38;
    optional FloatTextureParameter speculartint = 39;
    optional FloatTextureParameter sheen = 40;
    optional FloatTextureParameter sheentint = 41;
    optional double g = 42;
    optional double eta_as_value = 43;
    optional double scale = 44;
    optional bool remaproughness = 45;
    optional bool thin = 46;
  }

  optional MaterialOverrides overrides = 1;

  // The type of shape to create. If none of these fields are set, the directive
  // should be ignored.
  oneof shape_type {
    ConeShape cone = 2;  // Create a cone
    CylinderShape cylinder = 3;  // Create a cylinder
    DiskShape disk = 4;  // Create a disk
    HeightFieldShape heightfield = 5;  // Create a heightfield
    HyperboloidShape hyperboloid = 6;  // Create a hyperboloid
    LoopSubdivShape loopsubdiv = 7;  // Create a Loop subdivision surface
    NurbsShape nurbs = 8;  // Create a NURBS patch
    ParaboloidShape paraboloid = 9;  // Create a paraboloid
    SphereShape sphere = 10;  // Create a sphere
    TriangleMeshShape trianglemesh = 11;  // Create a triangle mesh
    CurveShape curve = 12;  // Creates a curve
    PlyMeshShape plymesh = 13;  // Creates a triangle mesh from a PLY file
  }
}

// A directive which creates a named SpectrumTexture.
message SpectrumTexture {
  // The name of the texture.
  required string name = 1;

  // The type of SpectrumTexture to create. If none are set this directive
  // should be ignored.
  oneof spectrum_texture_type {
    BilerpSpectrumTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DSpectrumTexture checkerboard2d = 3;  // Create a 2D board
    Checkerboard3DSpectrumTexture checkerboard3d = 4;  // Create a 3D board
    ConstantSpectrumTexture constant = 5;  // Create a constant texture
    DotsSpectrumTexture dots = 6;  // Create a dots texture
    FBmSpectrumTexture fbm = 7;  // Create an FBm texture
    ImageMapSpectrumTexture imagemap = 8;  // Create an image map texture
    MarbleSpectrumTexture marble = 9;  // Create an marble texture
    MixSpectrumTexture mix = 10;  // Create a mix texture
    ScaleSpectrumTexture scale = 11;  // Create a scale texture
    UvSpectrumTexture uv = 12;  // Create a UV texture
    WindySpectrumTexture windy = 13;  // Create a windy texture
    WrinkledSpectrumTexture wrinkled = 14;  // Create a wrinkled texture
    PtexSpectrumTexture ptex = 15;  // Create a ptex texture
  }
}

// A PBRTv3 directive.
message Directive {
  oneof directive_type {
    Accelerator accelerator = 1;
    AreaLightSource area_light_source = 2;
    AttributeBegin attribute_begin = 3;
    AttributeEnd attribute_end = 4;
    Camera camera = 5;
    ConcatTransform concat_transform = 6;
    CoordinateSystem coordinate_system = 7;
    CoordSysTransform coord_sys_transform = 8;
    Film film = 9;
    FloatTexture float_texture = 10;
    Identity identity = 11;
    Include include = 12;
    LightSource light_source = 13;
    LookAt look_at = 14;
    Material material = 15;
    ObjectBegin object_begin = 16;
    ObjectEnd object_end = 17;
    ObjectInstance object_instance = 18;
    PixelFilter pixel_filter = 19;
    ReverseOrientation reverse_orientation = 20;
    Rotate rotate = 21;
    Sampler sampler = 22;
    Scale scale = 24;
    Shape shape = 25;
    Integrator integrator = 26;
    SpectrumTexture spectrum_texture = 27;
    TransformBegin transform_begin = 28;
    TransformEnd transform_end = 29;
    Transform transform = 30;
    Translate translate = 31;
    WorldBegin world_begin = 34;
    WorldEnd world_end = 35;
    ActiveTransform active_transform = 36;
    MakeNamedMaterial make_named_material = 39;
    NamedMaterial named_material = 40;
    TransformTimes transform_times = 43;
    MakeNamedMedium make_named_medium = 44;
    MediumInterface medium_interface = 45;
  }
}

// A list of PBRTv3 directives.
message PbrtProto {
  repeated Directive directives = 1;
}

syntax = "proto2";

import "pbrt_proto/pbrt.proto";

package pbrt_proto.v1;

// A directive which sets the Accelerator to use for rendering.
message Accelerator {
  // The type of Accelerator to use. If none are set, then `kdtree` should be
  // read as if it is present.
  oneof accelerator_type {
    GridAccelerator grid = 1;  // Use a Grid accelerator
    KdTreeAccelerator kdtree = 2;  // Use a KD-tree accelerator (default)
  }
}

// A directive which sets the current area light source.
message AreaLightSource {
  // The type of AreaLightSource. If none are set, then the current area light
  // source should be unset.
  oneof area_light_source_type {
    DiffuseAreaLightSource area = 1;  // Use a diffuse area light
  }
}

// A directive which sets the current camera.
message Camera {
  // The type of camera to use. If none are set, then the current camera should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof camera_type {
    SphericalCamera environment = 1;  // Use a spherical camera
    OrthographicCamera orthographic = 2; // Use an orthographic camera
    PerspectiveCamera perspective = 3;  // Use a pespective camera
  }
}

// A directive which sets the Film to use for rendering
message Film {
  // The type of film to use. If none are set, then the current film should
  // be unset. If no camera is set at the time an image is to be rendered a
  // black frame should be rendered.
  oneof film_type {
    RgbFilm image = 1;  // Use an rgb film
  }
}

// A directive which creates a named FloatTexture.
message FloatTexture {
  // The name of the texture.
  required string name = 1;

  // The type of FloatTexture to create. If none are set this directive should
  // be ignored.
  oneof float_texture_type {
    BilerpFloatTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DFloatTexture checkerboard2d = 3;  // Create a 2D checkerboard
    Checkerboard3DFloatTexture checkerboard3d = 4;  // Create a 3D checkerboard
    ConstantFloatTexture constant = 5;  // Create a constant texture
    DotsFloatTexture dots = 6;  // Create a dots texture
    FBmFloatTexture fbm = 7;  // Create an FBm texture
    ImageMapFloatTexture imagemap = 8;  // Create an image map texture
    MixFloatTexture mix = 9;  // Create a mix texture
    ScaleFloatTexture scale = 10;  // Create a scale texture
    WindyFloatTexture windy = 11;  // Create a windy texture
    WrinkledFloatTexture wrinkled = 12;  // Create a wrinkled texture
  }
}

// A directive which creates a light source.
message LightSource {
  // The type of light source to create. If none of these fields are set, the
  // directive should have no impact.
  oneof light_source_type {
    DistantLightSource distant = 1;  // Create a distant directional light
    GoniometricLightSource goniometric = 2;  // Create a goniometric point light
    InfiniteLightSource infinite = 3;  // Create a distant spherical light
    InfiniteLightSource infinitesample = 4;  // Create a distant spherical light
    PointLightSource point = 5;  // Create a point light
    ProjectionLightSource projection = 6;  // Create a projected light
    SpotLightSource spot = 7;  // Create a spot light
  }
}

// A directive which creates a named material.
message MakeNamedMaterial {
  // The name to give the created medium.
  required string name = 1;

  // The material to create.
  required Material material = 2;
}

// A directive which creates a material.
message Material {
  // The type of material to create. If none of these fields are set, program
  // the behavior is undefined and the renderer may crash.
  oneof material_type {
    BuiltInMaterial bluepaint = 1;  // Create a blue paint material
    BuiltInMaterial brushedmetal = 2;  // Create a brushed paint material
    BuiltInMaterial clay = 3;  // Create a clay material
    BuiltInMaterial felt = 4;  // Create a felt material
    GlassMaterial glass = 5;  // Create a glass material
    MatteMaterial matte = 6;  // Create a mirror material
    MirrorMaterial mirror = 7;  // Create a mirror material
    PlasticMaterial plastic = 8;  // Create a plastic material
    BuiltInMaterial primer = 9;  // Create a primer material
    ShinyMetalMaterial shinymetal = 10;  // Create a shiny metal material
    BuiltInMaterial skin = 11;  // Create a skin material
    SubstrateMaterial substrate = 12;  // Create a substrate material
    TranslucentMaterial translucent = 13;  // Create a translucent material
    UberMaterial uber = 14;  // Create a uber material
  }
}

// A directive which sets the Camera to use for rendering.
message PixelFilter {
  // The type of PixelFilter to use. If none are set, then the current
  // PixelFilter should be unset. If no PixelFilter is set at the time an image
  // is to be rendered the renderer should exit with an error.
  oneof pixel_filter_type {
    BoxPixelFilter box = 1;  // Use a box filter
    GaussianPixelFilter gaussian = 2;  // Use a Gaussian filter
    MitchellPixelFilter mitchell = 3;  // Use a Mitchell-Netravali filter
    LanczosPixelFilter sinc = 4;  // Use a Lanczos filter
    TrianglePixelFilter triangle = 5;  // Use a triangle filter
  }
}

// A directive which sets the Sampler to use for rendering.
message Sampler {
  // A sampler which stratifies samples in the plane of the image.
  message Random {
    // The number of samples in the image `x` axis.
    optional uint32 xsamples = 5 [default = 2];

    // The number of samples in the image `y` axis.
    optional uint32 ysamples = 6 [default = 2];
  }

  // The type of Sampler to use. If none are set, then the current Sampler
  // should be unset. If no Sampler is set at the time an image is to be
  // rendered a black frame should be rendered.
  oneof sampler_type {
    BestCandidateSampler bestcandidate = 1;  // Use a best candidate sampler
    ZeroTwoSequenceSampler lowdiscrepancy = 2;  // Use a 02-sequence sampler
    Random random = 3;  // Use a minimally-stratified sampler
    StratifiedSampler stratified = 4;  // Use a stratified sampler
  }
}

// TODO
message Shape {
  message MaterialOverrides {
    optional SpectrumTextureParameter Kd = 1;
    optional SpectrumTextureParameter Ks = 2;
    optional SpectrumTextureParameter Kr = 3;
    optional SpectrumTextureParameter Kt = 4;
    optional SpectrumTextureParameter reflect = 5;
    optional SpectrumTextureParameter transmit = 6;
    optional SpectrumTextureParameter opacity = 7;
    optional FloatTextureParameter roughness = 8;
    optional FloatTextureParameter uroughness = 9;
    optional FloatTextureParameter vroughness = 10;
    optional FloatTextureParameter eta = 11;
    optional FloatTextureParameter sigma = 12;
    optional FloatTextureParameter bumpmap = 13;
  }
}

// A directive which creates a named SpectrumTexture.
message SpectrumTexture {
  // The name of the texture.
  required string name = 1;

  // The type of SpectrumTexture to create. If none are set this directive
  // should be ignored.
  oneof spectrum_texture_type {
    BilerpSpectrumTexture bilerp = 2;  // Create a bilerp texture
    Checkerboard2DSpectrumTexture checkerboard2d = 3;  // Create a 2D board
    Checkerboard3DSpectrumTexture checkerboard3d = 4;  // Create a 3D board
    ConstantSpectrumTexture constant = 5;  // Create a constant texture
    DotsSpectrumTexture dots = 6;  // Create a dots texture
    FBmSpectrumTexture fbm = 7;  // Create an FBm texture
    ImageMapSpectrumTexture imagemap = 8;  // Create an image map texture
    MarbleSpectrumTexture marble = 9;  // Create an marble texture
    MixSpectrumTexture mix = 10;  // Create a mix texture
    ScaleSpectrumTexture scale = 11;  // Create a scale texture
    UvSpectrumTexture uv = 12;  // Create a UV texture
    WindySpectrumTexture windy = 13;  // Create a windy texture
    WrinkledSpectrumTexture wrinkled = 14;  // Create a wrinkled texture
  }
}

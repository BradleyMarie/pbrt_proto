syntax = "proto2";

import "pbrt_proto/pbrt.proto";

package pbrt_proto;

message MakeNamedMaterial {
  required string name = 1;
  required Material material = 2;
}

message MakeNamedMedium {
  required string name = 1;
}

message Material {}

message SpectrumTexture {
  message Nested {}
  optional Nested nested = 1;
}

message Directive {
  oneof directive_type {
    ActiveTransform active_transform = 1;
    AttributeBegin attribute_begin = 2;
    AttributeEnd attribute_end = 3;
    ConcatTransform concat_transform = 4;
    CoordinateSystem coordinate_system = 5;
    CoordSysTransform coord_sys_transform = 6;
    Identity identity = 7;
    Include include = 8;
    Import import = 9;
    LookAt look_at = 10;
    MakeNamedMaterial make_named_material = 11;
    MakeNamedMedium make_named_medium = 12;
    Material material = 13;
    MediumInterface medium_interface = 14;
    NamedMaterial named_material = 15;
    ObjectBegin object_begin = 16;
    ObjectEnd object_end = 17;
    ObjectInstance object_instance = 18;
    ReverseOrientation reverse_orientation = 19;
    Rotate rotate = 20;
    Scale scale = 21;
    SearchPath search_path = 22;
    SpectrumTexture spectrum_texture = 23;
    TransformBegin transform_begin = 24;
    TransformEnd transform_end = 25;
    TransformTimes transform_times = 26;
    Transform transform = 27;
    Translate translate = 28;
    WorldBegin world_begin = 29;
    WorldEnd world_end = 30;
  }
}

message PbrtProto {
  repeated Directive directives = 1;
}

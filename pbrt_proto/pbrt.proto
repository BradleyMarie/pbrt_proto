// A built-in material with no parameters other than a bump map. Used to
// represent multiple materials that were present in PBRTv1.
message BuiltInMaterial {
  // The floating-point texture to be used as a bump map.
  optional FloatTextureParameter bumpmap = 13;
}

// A material that replicates Disney's Principled BRDF.
message DisneyMaterial {
  // The roughness of the surface.
  optional FloatTextureParameter roughness = 8;

  // Index of refraction of the surface.
  optional FloatTextureParameter eta = 11;

  // The floating-point texture to be used as a bump map.
  optional FloatTextureParameter bumpmap = 13;

  // The base color of the surface.
  optional SpectrumTextureParameter color = 22;

  // The path length light travels inside the material before exiting.
  optional SpectrumTextureParameter scatterdistance = 26;

  // Adjusts the asapect ratio of the specular highlights.
  optional FloatTextureParameter anisotropic = 28;

  // Adds a clearcoat over the base material.
  optional FloatTextureParameter clearcoat = 31;

  // Controls the roughness of the clearcoat.
  optional FloatTextureParameter clearcoatgloss = 32;

  // Controls how much light is diffusely transmitted through the surface.
  optional FloatTextureParameter difftrans = 33;

  // Softens the diffuse transition making the surface more like fabric.
  optional FloatTextureParameter flatness = 35;

  // Controls how metallic the surface appears.
  optional FloatTextureParameter metallic = 36;

  // Controls how much light is specularly transmitted through the surface.
  optional FloatTextureParameter spectrans = 38;

  // Adjusts the color of the specular highlights tinting them towards the
  // base color.
  optional FloatTextureParameter speculartint = 39;

  // Adds a fabric-like backscatter.
  optional FloatTextureParameter sheen = 40;

  // Adjust the color of the sheen reflection towards the base color.
  optional FloatTextureParameter sheentint = 41;

  // If true, the material is attached to a thin object like paper.
  optional bool thin = 46 [default = false];
}

// A material that approximates glass.
message GlassMaterial {
  // The coefficient of specular reflection.
  optional SpectrumTextureParameter Kr = 3;

  // The coefficient of specular transmission.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv2 and should be ignored when
  //       reading earlier input.
  optional SpectrumTextureParameter Kt = 4;

  // Microfacet roughness in the u direction. If zero, perfect specular
  // reflection is modeled.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter uroughness = 9;

  // Microfacet roughness in the v direction. If zero, perfect specular
  // reflection is modeled.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter vroughness = 10;


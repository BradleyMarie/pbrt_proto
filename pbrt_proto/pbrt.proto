  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional bool remaproughness = 45 [default = true];
}

// A simple translucent material with diffuse and specular compoents.
message TranslucentMaterial {
  // The coefficient of diffuse reflection.
  optional SpectrumTextureParameter Kd = 1;

  // The coefficient of glossy reflection.
  optional SpectrumTextureParameter Ks = 2;

  // The coefficient of specular reflection.
  optional SpectrumTextureParameter reflect = 5;

  // The fraction of reflected light.
  optional SpectrumTextureParameter transmit = 6;

  // The fraction of transmitted light.
  optional FloatTextureParameter roughness = 8;

  // The floating-point texture to be used as a bump map.
  optional FloatTextureParameter bumpmap = 13;

  // If true, roughness values are expected to be in the range [0,1], and are
  // remapped to microfacet distribution function parameter values that range
  // from near-perfect-specular at 0 to very rough at 1. Otherwise the roughness
  // parameters are used directly for the alpha parameters of the microfacet
  // distribution function.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional bool remaproughness = 45 [default = true];
}

// The "kitchen sink" material available in PBRTv1, PBRTv2, and PBRT v3.
message UberMaterial {
  // The coefficient of diffuse reflection.
  optional SpectrumTextureParameter Kd = 1;

  // The coefficient of glossy reflection.
  optional SpectrumTextureParameter Ks = 2;

  // The coefficient of specular reflection.
  optional SpectrumTextureParameter Kr = 3;

  // The coefficient of specular transmission.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv2 and should be ignored when
  //       reading earlier input.
  optional SpectrumTextureParameter Kt = 4;

  // The opacity of the surface. If less than one, the surface transmits light
  // without refraction.
  optional SpectrumTextureParameter opacity = 7;

  // The roughness of the surface.
  optional FloatTextureParameter roughness = 8;

  // Microfacet roughness in the u direction. If zero, perfect specular
  // reflection is modeled. If unset, falls back to the value from `roughness`.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter uroughness = 9;

  // Microfacet roughness in the v direction. If zero, perfect specular
  // reflection is modeled. If unset, falls back to the value from `roughness`.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter vroughness = 10;

  // Index of refraction of the surface. This value is used in both the
  // microfacet model for specular reflection as well as for computing a Fresnel
  // reflection term for perfect specular reflection.
  //
  // NOTE: Prior to PBRTv3 this field was named "index".
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv2 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter eta = 11;

  // The floating-point texture to be used as a bump map.
  optional FloatTextureParameter bumpmap = 13;

  // If true, roughness values are expected to be in the range [0,1], and are
  // remapped to microfacet distribution function parameter values that range
  // from near-perfect-specular at 0 to very rough at 1. Otherwise the roughness
  // parameters are used directly for the alpha parameters of the microfacet
  // distribution function.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional bool remaproughness = 45 [default = true];
}

//
// Common Participating Media
//

// A predefined scattering medium known by PBRT.
enum MeasuredScatteringPreset {
  UNSPECIFIED = 0;
  APPLE = 1;
  CHICKEN1 = 2;
  CHICKEN2 = 3;
  CREAM = 4;
  KETCHUP = 5;
  MARBLE = 6;
  POTATO = 7;
  SKIMMILK = 8;
  SKIN1 = 9;
  SKIN2 = 10;
  SPECTRALON = 11;
  WHOLEMILK = 12;
  LOWFAT_MILK = 13;
  REDUCED_MILK = 14;
  REGULAR_MILK = 15;
  ESPRESSO = 16;
  MINT_MOCHA_COFFEE = 17;
  LOWFAT_SOY_MILK = 18;
  REGULAR_SOY_MILK = 19;
  LOWFAT_CHOCOLATE_MILK = 20;
  REGULAR_CHOCOLATE_MILK = 21;
  COKE = 22;
  PEPSI = 23;
  SPRITE = 24;
  GATORADE = 25;
  CHARDONNAY = 26;
  WHITE_ZINFANDEL = 27;
  MERLOT = 28;
  BUDWEISER_BEER = 29;
  COORS_LIGHT_BEER = 30;
  CLOROX = 31;
  APPLE_JUICE = 32;
  CRANBERRY_JUICE = 33;
  GRAPE_JUICE = 34;
  RUBY_GRAPEFRUIT_JUICE = 35;
  WHITE_GRAPEFRUIT_JUICE = 36;
  SHAMPOO = 37;
  STRAWBERRY_SHAMPOO = 38;
  HEAD_AND_SHOULDERS_SHAMPOO = 39;
  LEMON_TEA_POWDER = 40;
  ORANGE_POWDER = 41;
  PINK_LEMONADE_POWDER = 42;
  CAPPUCCINO_POWDER = 43;
  SALT_POWDER = 44;
  SUGAR_POWDER = 45;
  SUISSE_MOCHA_POWDER = 46;
  PACIFIC_OCEAN_SURFACE_WATER = 47;
}

// A participating medium that uses Perlin noise to create cloud-like density.
message CloudMedium {
  // The absorption cross section.
  optional Spectrum sigma_a = 1;

  // The scattering cross section.
  optional Spectrum sigma_s = 2;

  // The phase function asymmetry.
  optional double g = 4 [default = 0.0];

  // The first corner of the bounding box defining the extents of the medium.
  optional Point p0 = 6;

  // The second corner of the bounding box defining the extents of the medium.
  optional Point p1 = 7;

  // Additional scale factor applied to the computed cloud density.
  optional double density = 8;

  // A parameter that controls the frequency at which the cloud density varies.
  optional double frequency = 12 [default = 5.0];

  // A parameter that controls how wispy the cloud density is.
  optional double wispiness = 13 [default = 1.0];
}

// A participating medium that is uniform throughout its volume.
message HomogeneousMedium {
  // The named measured scattering medium properties to use.
  optional MeasuredScatteringPreset preset = 1;

  // The absorption cross section.
  optional Spectrum sigma_a = 2;

  // The scattering cross section.
  optional Spectrum sigma_s = 3;

  // The phase function asymmetry.
  optional double g = 4 [default = 0.0];

  // Scale factor applied to the absorption and scattering cross sections.
  optional double scale = 5 [default = 1.0];

  // The spectral distribution of the medium's emitted radiance.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional Spectrum Le = 14;

  // The scale factor applied to the medium's emitted radiance.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional double Lescale = 15 [default = 1.0];
}

// A participating medium defined by a NanoVDB input.
message NanoVdbMedium {
  // The absorption cross section.
  optional Spectrum sigma_a = 2;

  // The scattering cross section.
  optional Spectrum sigma_s = 3;

  // The phase function asymmetry.
  optional double g = 4 [default = 0.0];

  // Scale factor applied to the absorption and scattering cross sections.
  optional double scale = 5 [default = 1.0];

  // The scale factor applied to the medium's emitted radiance.
  optional double Lescale = 15 [default = 1.0];

  // The filename of the NanoVDB volume.
  optional string filename = 16;

  // An offset value that is added to the emission temperature.
  optional double temperatureoffset = 17 [default = 0.0];

  // The scale factor applied to the ofsetted emission temperature to get a
  // temperature in kelvin before the blackbody emission is determined.
  optional double temperaturescale = 18 [default = 1.0];
}

// A participating medium defined by a uniform grid of points with non-uniform
// properties defined by RGB color values.
message RgbGridMedium {
  // The phase function asymmetry.
  optional double g = 4 [default = 0.0];

  // Scale factor applied to the absorption and scattering cross sections.
  optional double scale = 5 [default = 1.0];

  // The first corner of the bounding box defining the extents of the medium.
  optional Point p0 = 6;

  // The second corner of the bounding box defining the extents of the medium.
  optional Point p1 = 7;

  // The number of voxels in the x direction.
  optional uint32 nx = 9 [default = 1];

  // The number of voxels in the y direction.
  optional uint32 ny = 10 [default = 1];

  // The number of voxels in the z direction.
  optional uint32 nz = 11 [default = 1];

  // The scale factor applied to the medium's emitted radiance.
  optional double Lescale = 15 [default = 1.0];

  // The absorption cross section.
  optional RgbSpectrum sigma_a = 19;

  // The scattering cross section.
  optional RgbSpectrum sigma_s = 20;

  // The spectral distribution of the medium's emitted radiance for each voxel
  // in row-major order.
  repeated RgbSpectrum Le = 21;
}

// A participating medium defined by a uniform grid of points with non-uniform
// density.
message UniformGridMedium {
  // The named measured scattering medium properties to use.
  optional MeasuredScatteringPreset preset = 1;

  // The absorption cross section.
  optional Spectrum sigma_a = 2;

  // The scattering cross section.
  optional Spectrum sigma_s = 3;

  // The phase function asymmetry.
  optional double g = 4 [default = 0.0];

  // Scale factor applied to the absorption and scattering cross sections.
  optional double scale = 5 [default = 1.0];

  // The first corner of the bounding box defining the extents of the medium.
  optional Point p0 = 6;

  // The second corner of the bounding box defining the extents of the medium.
  optional Point p1 = 7;

  // The density values for each voxel of the medium in row-major order.
  repeated double density = 8;

  // The number of voxels in the x direction.
  optional uint32 nx = 9 [default = 1];

  // The number of voxels in the y direction.
  optional uint32 ny = 10 [default = 1];

  // The number of voxels in the z direction.
  optional uint32 nz = 11 [default = 1];

  // The spectral distribution of the medium's emitted radiance.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional Spectrum Le = 14;

  // The scale factor applied to the medium's emitted radiance.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional double Lescale = 15 [default = 1.0];

  // The offset value that is added to the emission temperature.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional double temperatureoffset = 17 [default = 0.0];

  // The scale factor applied to the ofsetted emission temperature to get a
  // temperature in kelvin before the blackbody emission is determined.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  optional double temperaturescale = 18 [default = 1.0];

  // The blackbody temperature values for each voxel in kelvin in row-major
  // order.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv4 and should be ignored when
  //       reading earlier input.
  repeated double temperature = 22;
}

//
// Common Pixel Filters
//

// A pixel filter that performs a box filter.
message BoxPixelFilter {
  // The width of the filter in the x direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "xwidth".
  optional double xradius = 1 [default = 0.5];

  // The width of the filter in the y direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "ywidth".
  optional double yradius = 2 [default = 0.5];
}

// A pixel filter that performs a Gaussian filter.
message GaussianPixelFilter {
  // The width of the filter in the x direction in pixels. The default value of
  // this value changed from 2.0 to 1.5 starting with PBRTv4.
  //
  // NOTE: Prior to PBRTv4 this field was named "xwidth".
  optional double xradius = 1;

  // The width of the filter in the x direction in pixels. The default value of
  // this value changed from 2.0 to 1.5 starting with PBRTv4.
  //
  // NOTE: Prior to PBRTv4 this field was named "ywidth".
  optional double yradius = 2;

  // Standard deviation of the Gaussian distribution.
  //
  // NOTE: Prior to PBRTv4 this field was named "alpha" and was computed
  //       differently. The formula to derive `alpha` from this field is
  //       `1.0 / (2.0 * sigma * sigma).
  optional double sigma = 3 [default = 0.5];
}

// A pixel filter that performs a Lanczos filter.
message LanczosPixelFilter {
  // The width of the filter in the x direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "xwidth".
  optional double xradius = 1 [default = 4.0];

  // The width of the filter in the y direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "ywidth".
  optional double yradius = 2 [default = 4.0];

  // The extent of the sinc function in cycles before it is clamped to zero.
  optional double tau = 4 [default = 3.0];
}

// A pixel filter that performs a Mitchell-Netravali filter.
message MitchellPixelFilter {
  // The width of the filter in the x direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "xwidth".
  optional double xradius = 1 [default = 2.0];

  // The width of the filter in the y direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "ywidth".
  optional double yradius = 2 [default = 2.0];

  // The `B` parameter that controls the shape of the filter.
  optional double B = 5 [default = 0.333333333333333333];

  // The `C` parameter that controls the shape of the filter.
  optional double C = 6 [default = 0.333333333333333333];
}

// A pixel filter that performs a triangle filter.
message TrianglePixelFilter {
  // The width of the filter in the x direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "xwidth".
  optional double xradius = 1 [default = 2.0];

  // The width of the filter in the y direction in pixels.
  //
  // NOTE: Prior to PBRTv4 this field was named "ywidth".
  optional double yradius = 2 [default = 2.0];
}

//
// Common Samplers
//

// The supported randomization methods for low discrepancy samplers.
enum SamplerRandomizationMethod {
  NONE = 0;
  PERMUTEDIGITS = 1;
  OWEN = 2;
  FASTOWEN = 3;
}

// A sampler which adaptively varies the number of samples per pixels.
message AdaptiveSampler {
  // The maximum number of samples per pixel.
  optional uint32 maxsamples = 1 [default = 32];

  // The minimum number of samples per pixel.
  optional uint32 minsamples = 5 [default = 4];

  // The supported methods for adapting the number of samples per pixel.
  enum Method {
    CONTRAST = 0;
    SHAPEID = 1;
  }

  // The method to use to determine the number of samples per pixel.
  optional Method method = 6 [default = CONTRAST];
}

// A sampler which uses the best canididate algorithm.
message BestCandidateSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 4];
}

// A low discrepancy sampler which uses a Halton sequence as its basis.
message HaltonSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1;

  // If true, samples are placed at the center of each pixel.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported in PBRTv3 and should be ignored when
  //       reading all other input.
  optional bool samplepixelcenter = 8 [default = false];

  // The seed used to scramble the distribution as part of the randomization.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional int32 seed = 9;

  // The method used to scramble the sequence to reduce the appearance of
  // visual artifacts from poor sample selection.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional SamplerRandomizationMethod randomization = 10;
}

// A sampler which uses an RNG and samples all dimensions independently.
message IndependentSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 4];

  // The seed used to initiate the RNG.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional int32 seed = 9;
}

// A sampler which uses the Grunschloss maximized-minimized algorithm.
message MaxMinDistSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 16];

  // The maximum number of sampled dimensions before falling back to a PRNG.
  optional uint32 dimensions = 7 [default = 4];
}

// A low discrepancy sampler which uses a stratified Sobol sequence as its
// basis.
message PaddedSobolSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 16];

  // The seed used to scramble the distribution as part of the randomization.
  optional int32 seed = 9;

  // The method used to scramble the sequence to reduce the appearance of
  // visual artifacts from poor sample selection.
  optional SamplerRandomizationMethod randomization = 10;
}

// A low discrepancy sampler which uses Pixar's progressive multi-jittered
// (0,2) sequence with blue noise properties as its basis
message PMJ02BNSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 16];

  // The seed used to scramble the distribution as part of the randomization.
  optional int32 seed = 9;
}

// A sampler which stratifies samples in the plane of the image.
message RandomSampler {
  // The number of samples in the image `x` axis.
  optional uint32 xsamples = 2 [default = 2];

  // The number of samples in the image `y` axis.
  optional uint32 ysamples = 3 [default = 2];
}

// A low discrepancy sampler which uses a Sobol sequence as its basis.
message SobolSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 16];

  // The seed used to scramble the distribution as part of the randomization.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional int32 seed = 9;

  // The method used to scramble the sequence to reduce the appearance of
  // visual artifacts from poor sample selection.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional SamplerRandomizationMethod randomization = 10;
}

// A sampler which stratifies samples generated by an RNG.
message StratifiedSampler {
  // The number of samples in the image `x` axis.
  optional uint32 xsamples = 2;

  // The number of samples in the image `y` axis.
  optional uint32 ysamples = 3;

  // If true, the samples are jittered based on the RNG.
  optional bool jitter = 4 [default = true];

  // The maximum number of sampled dimensions before falling back to an RNG.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is only supported in PBRTv3 and should be ignored when
  //       reading input from other versions.
  optional uint32 dimensions = 7 [default = 4];

  // The seed used to initiate the RNG.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported starting with PBRTv4 and should be
  //       ignored when reading earlier input.
  optional int32 seed = 9;
}

// A low discrepancy sampler which uses a Sobol sequence with blue noise as its
// basis.
message ZSobolSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1 [default = 16];

  // The seed used to scramble the distribution as part of the randomization.
  optional int32 seed = 9;

  // The method used to scramble the sequence to reduce the appearance of
  // visual artifacts from poor sample selection.
  optional SamplerRandomizationMethod randomization = 10;
}

// A low discrepancy sampler which uses a (0, 2) sequence as its basis.
message ZeroTwoSequenceSampler {
  // The number of samples to do per pixel.
  optional uint32 pixelsamples = 1;

  // The maximum number of sampled dimensions before falling back to an RNG.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is only supported in PBRTv3 and should be ignored when
  //       reading input from other versions.
  optional uint32 dimensions = 7 [default = 4];
}

//
// Common Shapes
//

// A tuple of three vertex indicies.
message VertexIndices {
  // The first vertex index.
  required uint32 v0 = 1;

  // The second vertex index.
  required uint32 v1 = 2;

  // The third vertex index.
  required uint32 v2 = 3;
}

// Creates a cone
message ConeShape {
  // The cone's radius.
  optional double radius = 1 [default = 1.0];

  // The height of the cone along the z axis.
  optional double height = 2 [default = 1.0];

  // The maximum extent of the cone in phi in spherical coordinates.
  optional double phimax = 3 [default = 360.0];
}

// Creates a curve
message CurveShape {
  // The type of curve.
  enum Basis {
    // An unsupported curve type.
    BEZIER = 0;   // A Bezier curve
    BSPLINE = 1;  // A B-spline
  }

  // The degree of the curve's spline.
  enum Degree {
    TWO = 0;
    THREE = 1;
  }

  // The type of curve variant.
  enum Type {
    FLAT = 0;      // Appear to always face the camera
    CYLINDER = 1;  // Appear cylindrical
    RIBBON = 2;    // Appear like a ribbon
  }

  // Control points for the cubic Bezier spline that goes along the center of
  // the curve shape.
  repeated Point P = 12;

  // The normals that are used for "ribbon" curves, these normals are
  // respectively used at endpoints of the curve to orient the surface there.
  // Intermediate normals are interpolated using spherical linear interpolation.
  repeated Vector N = 24;

  // The curve spline basis.
  optional Basis basis = 32 [default = BEZIER];

  // The degree of the curve's spline.
  optional Degree degree = 33 [default = THREE];

  // Determines which curve variant is used.
  optional Type type = 34 [default = FLAT];

  // The width of the curve.
  optional double width = 35 [default = 1.0];

  // The width of the curve at the start point. If set, this overrides the value
  // set in `width`.
  optional double width0 = 36;

  // The width of the curve at the end point. If set, this overrides the value
  // set in `width`.
  optional double width1 = 37;

  // The number of times the curve is split in half into sub-curves at startup
  // time. Splitting curves increases memory use but can improve ray
  // intersection performance, as the sub-curves generally have tighter bounding
  // boxes than the entire curve extent.
  optional uint32 splitdepth = 38 [default = 3];
}

// Creates a cylinder
message CylinderShape {
  // The cylinder's radius.
  optional double radius = 1 [default = 1.0];

  // The maximum extent of the cylinder in phi in spherical coordinates.
  optional double phimax = 3 [default = 360.0];

  // The height of the cylinder's bottom along the z axis.
  optional double zmin = 4 [default = -1.0];

  // The height of the cylinder's top along the z axis.
  optional double zmax = 5 [default = 1.0];
}

// Creates a disk
message DiskShape {
  // The outer radius of the disk.
  optional double radius = 1 [default = 1.0];

  // The location of the disk along the z axis.
  optional double height = 2 [default = 0.0];

  // The maximum extent of the disk in phi in spherical coordinates.
  optional double phimax = 3 [default = 360.0];

  // The inner radius of the disk (if nonzero, the disk is an annulus).
  optional double innerradius = 6 [default = 0.0];
}

// Creates a heightfield
message HeightFieldShape {
  // The number of sample values in the u direction.
  optional uint32 nu = 7;

  // The number of sample values in the v direction.
  optional uint32 nv = 8;

  // The array of values that define the heightfield.
  repeated double Pz = 9;
}

// Creates a hyperboloid
message HyperboloidShape {
  // The maximum extent of the hyperboloid in phi in spherical coordinates.
  optional double phimax = 3 [default = 360.0];

  // The first end point of the hyperboloid's line of revolution.
  optional Point p1 = 10;

  // The second end point of the hyperboloid's line of revolution.
  optional Point p2 = 11;
}

// Creates a Loop subdivision surface.
message LoopSubdivShape {
  // The vertex positions for the base mesh.
  repeated Point P = 12;

  // The indices for the base mesh.
  repeated VertexIndices indices = 13;

  // The number of levels of refinement to compute in the subdivision algorithm.
  //
  // NOTE: Prior to PBRTv3 this field was named "nlevels".
  optional uint32 levels = 14 [default = 3];
}

// Creates a NURBS patch.
message NurbsShape {
  // A point with a weight.
  message PointWithWeight {
    required Point p = 1;        // The point
    required double weight = 2;  // The weight
  }

  // Number of control points for NURBS patch in the u parametric directions.
  optional uint32 nu = 7;

  // Number of control points for NURBS patch in the v parametric directions.
  optional uint32 nv = 8;

  // The control points.
  //
  // NOTE: Should be preferred over Pw if both are present.
  repeated Point P = 12;

  // The order of NURBS surface in the u direction.
  optional uint32 uorder = 15;

  // The order of NURBS surface in the v direction.
  optional uint32 vorder = 16;

  // The knot vector for NURBS in the u direction.
  repeated float uknots = 17;

  // The knot vector for NURBS in the v direction.
  repeated float vknots = 18;

  // The starting u parametric coordinates at which to evaluate NURBS.
  optional double u0 = 19;

  // The starting v parametric coordinates at which to evaluate NURBS.
  optional double v0 = 20;

  // The ending u parametric coordinates at which to evaluate NURBS.
  optional double u1 = 21;

  // The ending v parametric coordinates at which to evaluate NURBS.

  // microfacet model for specular reflection as well as for computing a Fresnel
  // reflection term for perfect specular reflection.
  //
  // NOTE: Prior to PBRTv3 this field was named "index".
  optional FloatTextureParameter eta = 11;

  // The floating-point texture to be used as a bump map.
  optional FloatTextureParameter bumpmap = 13;

  // If true, roughness values are expected to be in the range [0,1], and are
  // remapped to microfacet distribution function parameter values that range
  // from near-perfect-specular at 0 to very rough at 1. Otherwise the roughness
  // parameters are used directly for the alpha parameters of the microfacet
  // distribution function.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional bool remaproughness = 45 [default = true];
}

// A material that approximates hair.
message HairMaterial {
  // The index of refraction of the scattering volume.
  optional FloatTextureParameter eta = 11;

  // If specified, a value of the absorption coefficient is computed using an
  // approximation that leads to the hair having roughly this color, after
  // multiple scattering in the hair during rendering.
  optional SpectrumTextureParameter color = 22;

  // The absorption coefficient of the volume.
  optional SpectrumTextureParameter sigma_a = 24;

  // This represents the tilt angle of the cuticle scales on the hair surface.
  optional FloatTextureParameter alpha = 27;

  // The longitudinal roughness of the hair surface.
  optional FloatTextureParameter beta_m = 29;

  // The azimuthal roughness of the hair surface.
  optional FloatTextureParameter beta_n = 30;


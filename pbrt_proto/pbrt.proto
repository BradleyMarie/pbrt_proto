  optional string filename = 31 [default = ""];
}

// Creates a sphere
message SphereShape {
  // The sphere's radius.
  optional double radius = 1 [default = 1.0];

  // The maximum extent of the paraboloid in phi in spherical coordinates.
  optional double phimax = 3 [default = 360.0];

  // The height of the lower clipping plane along the z axis.
  //
  // NOTE: Defined to be -radius if not set.
  optional double zmin = 4;

  // The height of the upper clipping plane along the z axis.
  //
  // NOTE: Defined to be +radius if not set.
  optional double zmax = 5;
}

// Creates a triangle mesh
message TriangleMeshShape {
  // A pair of UV coordinates.
  message UVCoordinate {
    required double u = 1;  // The u coordinate.
    required double v = 2;  // The v coordinate.
  }

  // The vertex positions of the triangle mesh.
  repeated Point P = 12;

  // The array of integer offsets into the per-vertex data arrays.
  repeated VertexIndices indices = 13;

  // The per-vertex normals. If present, shading normals will be computed from
  // these values.
  repeated Vector N = 24;

  // The per-vertex tangents.
  repeated Vector S = 25;

  // The per-vertex texture coordinates.
  repeated UVCoordinate uv = 26;

  // If true, degenerate UV values are ignored.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported in PBRTv2 and should be ignored when
  //       reading all other input.
  optional bool discarddegenerateUVs = 27 [default = false];

  // When provided, at any point on the triangle where the alpha texture
  // evaluates to have the value zero, the triangle is cut away and any ray
  // intersection is ignored.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is not supported before PBRTv2 and should be ignored when
  //       reading earlier input.
  optional FloatTextureParameter alpha = 28;

  // When provided, intersections at any points on the triangle where the alpha
  // texture evaluates to zero are ignored.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is only supported in PBRTv3 and should be ignored when
  //       reading all other input.
  optional FloatTextureParameter shadowalpha = 29;

  // Provides a list of numeric identifiers for each face.
  //
  // NOTE: For simplicity, this field is shared between all PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  repeated int32 faceIndices = 30;
}


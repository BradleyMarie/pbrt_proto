  // remapped to microfacet distribution function parameter values that range
  // from near-perfect-specular at 0 to very rough at 1. Otherwise the roughness
  // parameters are used directly for the alpha parameters of the microfacet
  // distribution function.
  //
  // NOTE: For simplicity, this field is shared across multiple PBRT versions;
  //       however, it is not supported before PBRTv3 and should be ignored when
  //       reading earlier input.
  optional bool remaproughness = 45 [default = true];
}


name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  island-scene:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 1024
        remove-android: 'false'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        remove-dotnet: 'true'
        remove-haskell: 'true'

    - uses: actions/checkout@v3

    - name: optimized build
      run: bazel build -c opt ...

    - name: Download island scene
      run: curl -O https://wdas-datasets-disneyanimation-com.s3-us-west-2.amazonaws.com/moanaislandscene/island-pbrt-v1.1.tgz

    - name: Extract island scene
      run: tar -xvf island-pbrt-v1.1.tgz && rm island-pbrt-v1.1.tgz

    - name: Convert island scene
      run: bazel-bin/tools/pbrt_proto_converter --pbrt_version=3 --recursive island/pbrt/island.pbrt

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]

    steps:
    - uses: actions/checkout@v3

    - name: debug build (gcc)
      run: bazel build ...

    - name: debug tests (gcc)
      run: bazel test ...

    - name: optimized build (gcc)
      run: bazel build -c opt ...

    - name: optimized tests (gcc)
      run: bazel test -c opt ...

    - name: clean
      run: bazel clean --expunge

    - name: debug build (clang)
      run: bazel build ... --repo_env=cc=clang

    - name: debug tests (clang)
      run: bazel test ... --repo_env=cc=clang

    - name: optimized build (clang)
      run: bazel build -c opt ... --repo_env=cc=clang

    - name: optimized tests (clang)
      run: bazel test -c opt ... --repo_env=cc=clang

  build-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, windows-2022]

    steps:
    - uses: actions/checkout@v3

    - name: debug build
      run: bazel --output_base=C:\b build ...

    - name: debug tests
      run: bazel --output_base=C:\b test ...

    - name: optimized build
      run: bazel --output_base=C:\b build -c opt

    - name: optimized tests
      run: bazel --output_base=C:\b test -c opt ...


  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-14]

    steps:
    - uses: actions/checkout@v3

    - name: debug build
      run: bazel build ...

    - name: debug tests
      run: bazel test ...

    - name: optimized build
      run: bazel build -c opt

    - name: optimized tests
      run: bazel test -c opt ...
